<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猫咪健康助手</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
  h1 { color: #333; }
  input, button { padding: 10px; font-size: 16px; margin-top: 10px; }
  #results { margin-top: 20px; }
</style>
</head>
<body>

<h1>猫咪健康助手</h1>
<p>输入猫咪的不适症状（如：呕吐、食欲不振、打喷嚏）：</p>
<input type="text" id="symptomInput" placeholder="输入症状">
<button onclick="checkSymptoms()">查询可能问题</button>

<div id="results"></div>

<script>
const symptomDatabase = {
  "呕吐": ["胃肠炎", "食物不耐受", "毛球堵塞", "中毒"],
  "食欲不振": ["牙齿问题", "肝脏疾病", "肾脏疾病", "压力"],
  "打喷嚏": ["呼吸道感染", "鼻炎", "过敏"],
  "拉稀": ["寄生虫感染", "肠炎", "食物过敏"],
  "咳嗽": ["呼吸道感染", "心脏病", "气管问题"],
  "嗜睡": ["感染", "贫血", "疼痛", "甲状腺问题"]
};

function checkSymptoms() {
  const input = document.getElementById("symptomInput").value.trim();
  const resultsDiv = document.getElementById("results");
  
  if (!input) {
    resultsDiv.innerHTML = "<p style='color:red;'>请输入症状！</p>";
    return;
  }
  
  const matchedProblems = symptomDatabase[input];
  
  if (matchedProblems) {
    resultsDiv.innerHTML = `<p>猫咪出现 <strong>${input}</strong> 的可能问题：</p><ul>${matchedProblems.map(p => `<li>${p}</li>`).join('')}</ul>`;
  } else {
    resultsDiv.innerHTML = `<p>抱歉，暂时没有关于 <strong>${input}</strong> 的信息。</p>`;
  }
}
</script>

</body>
</html>
